<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 200" width="340" height="200">

  <!-- Rectangle fond beige doux -->
  <rect x="30" y="20" width="280" height="160" rx="2" fill="#f5f0ea" stroke="#c4a882" stroke-width="0.8"/>
  <rect x="38" y="28" width="264" height="144" rx="1" fill="none" stroke="#c4a882" stroke-width="0.3"/>

  <!-- Ornement haut centre -->
  <text x="170" y="52"
    font-family="Georgia, serif"
    font-size="10"
    fill="#c4a882"
    text-anchor="middle"
    letter-spacing="2">— ✦ —</text>

  <!-- STUDIO -->
  <text x="170" y="88"
    font-family="Georgia, serif"
    font-size="11"
    font-weight="400"
    fill="#2a2826"
    text-anchor="middle"
    letter-spacing="10">STUDIO</text>

  <!-- OF en tout petit centré -->
  <text x="170" y="108"
    font-family="Georgia, serif"
    font-size="9"
    font-style="italic"
    fill="#c4a882"
    text-anchor="middle"
    letter-spacing="4">of</text>

  <!-- BEAUTY grand -->
  <text x="170" y="138"
    font-family="Georgia, serif"
    font-size="30"
    font-weight="400"
    fill="#2a2826"
    text-anchor="middle"
    letter-spacing="8">BEAUTY</text>

  <!-- Ornement bas -->
  <text x="170" y="158"
    font-family="Georgia, serif"
    font-size="10"
    fill="#c4a882"
    text-anchor="middle"
    letter-spacing="2">— ✦ —</text>

</svg>
