<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon compte — Studio of Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="menu-overlay" id="menuOverlay">
  <button class="menu-close" onclick="closeMenu()">Fermer ✕</button>
  <nav class="menu-links">
    <a href="index.html">Accueil</a>
    <a href="shop.html">Boutique</a>
    <a href="shop.html">L'essentiel Brow</a>
    <a href="shop.html">L'essentiel Lash</a>
    <a href="reviews.html">Avis</a>
    <a href="signup.html">Créer un compte</a>
    <a href="login.html">Connexion</a>
    <a href="index.html">Contact</a>
  </nav>
</div>

<header>
  <div class="header-left">
    <div class="hamburger" onclick="openMenu()">
      <span></span><span></span><span></span>
    </div>
  </div>
  <div class="header-center"><a href="index.html">Studio of Beauty</a></div>
  <div class="header-right">
    <div class="header-icon" id="accountIcon" onclick="goToAccount()" title="Compte">
      <svg id="accountSvg" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg>
      <span class="avatar-badge" id="avatarBadge">A B</span>
    </div>
    <div class="header-icon" style="position:relative;">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-badge">0</span>
    </div>
  </div>
</header>

<main>
  <div class="account-sheet">
    <div class="account-card">
      <div class="account-card-top">
        <button class="account-close" type="button" onclick="location.href='index.html'">×</button>
        <div class="account-user-icon">◯</div>
        <div class="account-fullname" id="accountFullName">Mon compte</div>
        <button class="account-main-btn" type="button">Mon compte</button>
      </div>
      <div class="account-menu">
        <a href="#" class="account-menu-item">
          <span class="account-menu-emoji">📓</span>
          <span>Mes commandes</span>
        </a>
      </div>
      <div class="account-logout">
        <button type="button" onclick="logout()">↪ Me déconnecter</button>
      </div>
    </div>
  </div>
</main>

<script src="js/app.js"></script>
<script>
  if (!getCurrentUser()) location.href = 'signup.html';
  else {
    const fn = document.getElementById('accountFullName');
    const u = getCurrentUser();
    if (fn && u) fn.textContent = u.firstName + ' ' + u.lastName;
  }
</script>
</body>
</html>
