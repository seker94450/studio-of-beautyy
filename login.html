<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Studio of Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="menu-overlay" id="menuOverlay">
  <button class="menu-close" onclick="closeMenu()">Fermer ?</button>
  <nav class="menu-links">
    <a href="index.html">Accueil</a>
    <a href="shop.html">Boutique</a>
    <a href="product-brow-beige.html">L'essentiel Brow</a>
    <a href="product-lash-beige.html">L'essentiel Lash</a>
  </nav>
</div><header>
  <div class="header-left"></div>
  <div class="header-center">
    <nav class="top-nav">
      <a href="index.html">Accueil</a>
      <a href="shop.html">Boutique</a>
      <a href="product-brow-beige.html">L'essentiel Brow</a>
      <a href="product-lash-beige.html">L'essentiel Lash</a>
    </nav>
  </div>
  <div class="header-right">
    <div class="header-icon" id="accountIcon" onclick="goToAccount()" title="Compte">
      <svg id="accountSvg" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg>
      <span class="avatar-badge" id="avatarBadge">A B</span>
    </div>
    <a href="cart.html" class="header-icon cart-link" title="Panier">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-badge">0</span>
    </a>
  </div>
</header>

<main>
  <div class="auth-shell">
    <div class="auth-card">
      <p class="auth-eyebrow">Connexion</p>
      <h1 class="auth-title">Connectez-vous à votre compte</h1>
      <p class="auth-text">Entrez votre adresse e-mail et votre mot de passe pour accéder à votre espace.</p>
      <form class="auth-form" id="loginForm">
        <div class="field">
          <label for="loginEmail">Adresse e-mail</label>
          <input id="loginEmail" type="email" required>
        </div>
        <div class="field password-field">
          <label for="loginPassword">Mot de passe</label>
          <input id="loginPassword" type="password" required>
          <button class="password-toggle" type="button" onclick="togglePassword('loginPassword', this)">👁</button>
        </div>
        <button class="auth-btn" id="loginSubmitBtn" type="submit">Se connecter</button>
        <div class="auth-message" id="loginMessage"></div>
      </form>
      <div class="account-panel" id="accountPanel">
        <div class="account-name" id="accountName"></div>
        <div class="account-meta" id="accountEmail"></div>
        <button class="auth-btn secondary" type="button" onclick="location.href='account.html'">Ouvrir mon compte</button>
      </div>
      <p class="auth-switch" id="loginSwitchText">Pas encore de compte ? <a href="signup.html">Créer un compte</a></p>
      <a class="home-link" href="index.html">Retour à l'accueil</a>
    </div>
  </div>
</main>

<script src="js/app.js"></script>
</body>
</html>
